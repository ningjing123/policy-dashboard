<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>时政新闻分析看板 · 从碎片新闻看清政策大局</title>
<style>
  :root{
    --bg:#f4f1e8; --bg2:#faf7f0; --panel:#fffdf7; --panel2:#efeadd;
    --line:#e3ddcd; --line2:#d3ccb7;
    --txt:#2a2d26; --txt2:#54584c; --txt3:#8b8b7c;
    --accent:#2d6a4f; --accent-soft:rgba(45,106,79,.08); --accent-line:rgba(45,106,79,.34);
    --money:#a9781f; --money-bg:rgba(169,120,31,.11); --money-line:rgba(169,120,31,.34);
    --power:#2a7d8c; --power-bg:rgba(42,125,140,.11); --power-line:rgba(42,125,140,.34);
    --rule:#8a5a72; --rule-bg:rgba(138,90,114,.11);
    --ok:#4f9d5a; --ok-bg:rgba(79,157,90,.13); --ok-line:rgba(79,157,90,.36);
    --warn:#b07d1e; --pending:#8b8b7c;
    --serif:"Songti SC","Source Han Serif SC","Noto Serif CJK SC",STSong,SimSun,serif;
    --sans:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --radius:14px; --radius-sm:10px;
    --shadow:0 10px 30px rgba(20,24,35,.12);
    --ease:cubic-bezier(.2,.8,.2,1);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:
      radial-gradient(1100px 620px at 82% -12%,rgba(45,106,79,.08),transparent 55%),
      var(--bg);
    color:var(--txt);font-family:var(--sans);font-size:15px;line-height:1.62;
    -webkit-font-smoothing:antialiased;min-height:100vh;background-attachment:fixed}
  .wrap{max-width:1180px;margin:0 auto;padding:34px 24px 80px}
  .wrap::before{content:"";position:fixed;top:0;left:0;right:0;height:3px;
    background:linear-gradient(90deg,var(--accent),transparent 72%);z-index:50}

  /* ---------- Header ---------- */
  header.hd{margin-bottom:24px}
  .hd-title{font-family:var(--serif);font-size:clamp(24px,3.2vw,32px);font-weight:800;
    letter-spacing:.5px;display:flex;align-items:center;gap:13px;color:var(--txt)}
  .hd-title .dot{width:11px;height:11px;border-radius:2px;background:var(--accent)}
  .hd-sub{color:var(--txt2);font-size:14.5px;margin-top:9px;max-width:780px}
  .hd-stats-row{display:flex;align-items:center;gap:14px;margin-top:20px;flex-wrap:wrap}
  .hd-stats{display:flex;align-items:center;gap:0;flex-wrap:wrap}
  .stat{display:flex;align-items:baseline;gap:7px;padding:0 20px 0 0;position:relative}
  .stat:not(:last-child)::after{content:"";position:absolute;right:0;top:-3px;bottom:-3px;width:1px;background:var(--line)}
  .stat b{font-family:var(--serif);font-size:23px;font-weight:700;color:var(--accent);line-height:1}
  .stat span{font-size:12.5px;color:var(--txt3)}
  .disclaimer{margin-top:18px;font-size:12.5px;color:var(--txt3);
    background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--warn);
    border-radius:8px;padding:10px 14px;display:flex;gap:9px;align-items:flex-start;line-height:1.7}
  .disclaimer b{color:var(--warn);font-weight:700}

  /* ---------- Tabs (Layer 1) ---------- */
  .tabs-label{font-size:11.5px;color:var(--txt3);letter-spacing:3px;margin:30px 0 0;text-transform:uppercase;
    font-family:var(--serif)}
  .tabs-label::before{content:"";display:inline-block;width:18px;height:2px;background:var(--accent);
    vertical-align:middle;margin-right:9px}
  .tabs{display:flex;gap:2px;flex-wrap:wrap;border-bottom:1px solid var(--line);margin-top:10px}
  .tab{position:relative;background:transparent;border:none;color:var(--txt3);
    padding:11px 15px;cursor:pointer;font-size:14.5px;font-weight:600;
    transition:color .18s ease;user-select:none;font-family:var(--sans)}
  .tab .cnt{font-size:11px;font-weight:700;margin-left:6px;opacity:.6;color:var(--txt3)}
  .tab:hover{color:var(--txt)}
  .tab.active{color:var(--accent)}
  .tab.active .cnt{color:var(--accent);opacity:1}
  .tab::after{content:"";position:absolute;left:12px;right:12px;bottom:-1px;height:2px;
    background:var(--accent);transform:scaleX(0);transform-origin:center;transition:transform .26s var(--ease)}
  .tab.active::after{transform:scaleX(1)}
  .tab.empty{opacity:.4}
  .tab.empty.active{opacity:1}

  /* ---------- Filter bar (Layer 2 secondary) ---------- */
  .filters{display:flex;gap:20px;flex-wrap:wrap;align-items:center;
    margin:22px 0 10px;padding:14px 18px;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius-sm)}
  .fgroup{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .fgroup .flabel{font-size:12px;color:var(--txt3);margin-right:2px;letter-spacing:.5px}
  .chip{border:1px solid var(--line2);background:transparent;color:var(--txt2);
    padding:5px 13px;border-radius:16px;cursor:pointer;font-size:12.5px;transition:all .16s var(--ease);font-family:var(--sans)}
  .chip:hover{color:var(--txt);border-color:var(--txt3)}
  .chip.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .chip.on.money{background:var(--money);border-color:var(--money);color:#2a1d00}
  .chip.on.power{background:var(--power);border-color:var(--power);color:#04201d}
  .reset{margin-left:auto;font-size:12.5px;color:var(--txt3);cursor:pointer;
    text-decoration:underline;text-underline-offset:3px;transition:color .14s}
  .reset:hover{color:var(--accent)}

  /* ---------- Story cards ---------- */
  .cards{margin-top:22px;display:flex;flex-direction:column;gap:18px}
  .story{background:linear-gradient(180deg,var(--panel),var(--bg2));
    border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:var(--radius);
    overflow:hidden;box-shadow:var(--shadow);animation:riseIn .42s var(--ease) both}
  .story-hd{padding:18px 22px;display:flex;align-items:flex-start;gap:14px;
    border-bottom:1px solid var(--line);transition:background .15s}
  .sh-main{flex:1;min-width:0}
  .sh-line{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .sh-name{font-size:18.5px;font-weight:800}
  .sh-meta{color:var(--txt3);font-size:12.5px;margin-top:6px;display:flex;gap:15px;flex-wrap:wrap}
  .sh-meta b{color:var(--txt2);font-weight:600}
  .closed-badge{font-size:12px;font-weight:800;padding:5px 13px;border-radius:20px;white-space:nowrap;letter-spacing:.5px}
  .closed-badge.yes{background:var(--ok-bg);color:var(--ok);border:1px solid var(--ok-line)}
  .closed-badge.no{background:rgba(120,125,133),.12);color:var(--txt3);border:1px solid var(--line2)}
  .toggle{color:var(--txt3);font-size:12px;display:flex;align-items:center;gap:5px;white-space:nowrap;padding-top:3px}
  .toggle .arw{transition:transform .2s}
  .story.open .toggle .arw{transform:rotate(90deg)}
  .tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px}
  .tag{font-size:11.5px;color:var(--txt2);background:rgba(35,38,43,.05);
    border:1px solid var(--line);border-radius:6px;padding:2px 9px}
  .tag.hot{color:var(--accent);border-color:var(--accent-line);background:var(--accent-soft)}
  .tag.primary{color:#fff;background:var(--accent);border-color:var(--accent);font-weight:600}

  /* six-step checklist */
  .steps{padding:8px 22px 22px}
  .step{display:flex;gap:16px;padding:14px 0;border-top:1px solid var(--line)}
  .step:first-child{border-top:none}
  .step-tag{flex:0 0 122px;display:flex;flex-direction:column;gap:3px}
  .step-no{font-size:11px;font-weight:800;color:var(--accent);letter-spacing:1.5px}
  .step-name{font-size:13.5px;font-weight:700;color:var(--txt)}
  .step-body{flex:1;min-width:0}

  .actor-cols{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .acol{border-radius:var(--radius-sm);padding:12px 14px}
  .acol.money{background:var(--money-bg);border:1px solid var(--money-line)}
  .acol.power{background:var(--power-bg);border:1px solid var(--power-line)}
  .acol-hd{font-size:12px;font-weight:800;margin-bottom:8px;display:flex;align-items:center;gap:6px}
  .acol.money .acol-hd{color:var(--money)}
  .acol.power .acol-hd{color:var(--power)}
  .actor{font-size:13px;color:var(--txt);padding:3px 0;display:flex;justify-content:space-between;gap:8px}
  .actor .act{color:var(--txt3);font-size:12px}
  .none{color:var(--txt3);font-size:12.5px;font-style:italic}

  .rules{display:flex;gap:7px;flex-wrap:wrap}
  .rule-pill{font-size:12px;color:var(--rule);background:var(--rule-bg);
    border:1px solid rgba(185,139,217,.3);border-radius:6px;padding:3px 10px}

  .parties{display:flex;gap:7px;flex-wrap:wrap;align-items:center}
  .party{font-size:12.5px;color:var(--txt2);background:rgba(35,38,43,.05);border:1px solid var(--line);border-radius:6px;padding:2px 9px}
  .party.lead{color:#fff;background:var(--accent);border-color:var(--accent);font-weight:600}
  .cross{font-size:11.5px;color:var(--warn);font-weight:700;margin-left:4px}

  .qual{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .badge{font-size:11.5px;font-weight:700;border-radius:6px;padding:3px 10px;border:1px solid var(--line2);color:var(--txt2)}
  .badge.lv{color:#c0623a;border-color:rgba(192,98,58,.4);background:rgba(192,98,58,.1)}
  .badge.imp-high{color:#d6452f;border-color:rgba(214,69,47,.4);background:rgba(214,69,47,.1)}
  .badge.imp-medium{color:var(--warn);border-color:rgba(224,169,58,.4);background:rgba(224,169,58,.1)}

  /* timeline */
  .tl{position:relative;padding-left:4px}
  .tl-item{display:flex;gap:12px;padding:7px 0;position:relative;color:inherit;text-decoration:none}
  a.tl-item{color:inherit;text-decoration:none}
  .tl-node{flex:0 0 12px;display:flex;flex-direction:column;align-items:center;padding-top:5px}
  .tl-node .d{width:11px;height:11px;border-radius:50%;background:var(--panel);border:2px solid var(--line2);z-index:1;transition:all .2s}
  .tl-item.done .tl-node .d{background:var(--accent);border-color:var(--accent)}
  .tl-item.pending .tl-node .d{border-style:dashed}
  .tl-node .bar{flex:1;width:2px;background:var(--line);margin-top:2px}
  .tl-item:last-child .tl-node .bar{display:none}
  .tl-body{flex:1;padding-bottom:6px}
  .tl-stage{font-size:11px;font-weight:800;color:var(--txt3);letter-spacing:.5px}
  .tl-title{font-size:13.5px;color:var(--txt);margin-top:1px}
  .tl-date{font-size:11.5px;color:var(--txt3);margin-top:2px}
  .incub{margin-top:10px;font-size:12px;color:var(--money);background:var(--money-bg);
    border:1px solid var(--money-line);border-radius:7px;padding:8px 12px;line-height:1.6}
  .incub b{color:var(--money)}

  /* closure step */
  .closure{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .cl-item{font-size:12.5px;font-weight:700;padding:5px 13px;border-radius:8px;border:1px solid var(--line2);color:var(--txt3);display:flex;gap:6px;align-items:center}
  .cl-item.on.money{color:var(--money);border-color:var(--money-line);background:var(--money-bg)}
  .cl-item.on.power{color:var(--power);border-color:var(--power-line);background:var(--power-bg)}
  .cl-final{font-size:13px;font-weight:800;padding:5px 14px;border-radius:8px}
  .cl-final.yes{color:var(--ok);background:var(--ok-bg);border:1px solid var(--ok-line)}
  .cl-final.no{color:var(--txt3);background:rgba(120,125,133),.1);border:1px solid var(--line2)}

  /* macro chain */
  .macro{display:flex;align-items:stretch;gap:0;flex-wrap:wrap}
  .macro-node{flex:1;min-width:120px;background:var(--panel2);border:1px solid var(--line);
    border-radius:var(--radius-sm);padding:11px 13px}
  .macro-node .mn-lb{font-size:11px;color:var(--txt3);font-weight:700;margin-bottom:5px;letter-spacing:.5px}
  .macro-node .mn-v{font-size:12.5px;color:var(--txt2);line-height:1.55}
  .macro-arrow{flex:0 0 26px;display:flex;align-items:center;justify-content:center;color:var(--accent);font-size:16px}

  /* detail (per-news) */
  .detail{border-top:1px solid var(--line);background:rgba(35,38,43,.05);padding:0}
  .detail-inner{padding:17px 22px}
  .detail-hd{font-size:11px;color:var(--txt3);letter-spacing:1.5px;margin-bottom:13px;text-transform:uppercase;font-family:var(--serif)}

  /* steps collapsible (default folded) */
  .steps-details{border-top:1px solid var(--line);background:rgba(35,38,43,.03)}
  .steps-details > summary{list-style:none;cursor:pointer;display:flex;align-items:center;gap:12px;
    padding:14px 22px;user-select:none;transition:background .15s}
  .steps-details > summary::-webkit-details-marker{display:none}
  .steps-details > summary:hover{background:rgba(35,38,43,.06)}
  .sd-title{font-family:var(--serif);font-size:14.5px;font-weight:800;color:var(--txt)}
  .sd-status{font-size:11.5px;font-weight:700;padding:3px 11px;border-radius:14px;border:1px solid var(--line2);color:var(--txt3);white-space:nowrap}
  .sd-status.ok{color:var(--ok);background:var(--ok-bg);border-color:var(--ok-line)}
  .sd-status.pending{color:var(--txt3);background:rgba(120,125,133),.1);border-color:var(--line2)}
  .sd-arw{margin-left:auto;color:var(--txt3);font-size:13px;transition:transform .2s}
  .steps-details[open] > summary .sd-arw{transform:rotate(90deg)}
  .steps-details[open] > summary{border-bottom:1px solid var(--line)}
  .news{border:1px solid var(--line);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:11px;background:var(--panel)}
  .news:last-child{margin-bottom:0}
  .news-top{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;align-items:flex-start}
  .news-title{font-size:14.5px;font-weight:700;flex:1;min-width:0;line-height:1.5}
  .news-src{font-size:11.5px;color:var(--txt3);white-space:nowrap}
  .news-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px 18px;margin-top:11px}
  .nf{font-size:12.5px}
  .nf .k{color:var(--txt3);font-size:11px;letter-spacing:.3px}
  .nf .v{color:var(--txt2)}
  .news-summary .v{max-height:170px;overflow:auto;line-height:1.7;color:#5d5240;
    background:rgba(35,38,43,.04);border:1px solid var(--line);border-radius:8px;padding:9px 11px;font-size:13px}
  .mini-role{display:inline-block;font-size:11px;padding:1px 7px;border-radius:5px;margin:2px 4px 0 0}
  .mini-role.money{color:var(--money);background:var(--money-bg)}
  .mini-role.power{color:var(--power);background:var(--power-bg)}

  /* clickable timeline item */
  .tl-item.clickable{cursor:pointer;border-radius:8px;transition:background .14s;margin:0 -8px;padding-left:8px;padding-right:8px}
  .tl-item.clickable:hover{background:var(--accent-soft)}
  .tl-item.clickable:hover .tl-title{color:var(--accent)}
  .tl-open{font-size:11.5px;color:var(--accent);font-weight:700;margin-left:8px;white-space:nowrap;opacity:.85}
  .news-open{font-size:11.5px;color:var(--accent);font-weight:700;cursor:pointer;margin-left:6px;white-space:nowrap;text-decoration:none}
  .news-open:hover{text-decoration:underline;text-underline-offset:2px}

  /* ---------- Modal (news full view) ---------- */
  .modal-mask{position:fixed;inset:0;background:rgba(45,35,22,.42);backdrop-filter:blur(3px);
    display:none;align-items:flex-start;justify-content:center;padding:48px 18px;z-index:100;overflow-y:auto}
  .modal-mask.show{display:flex;animation:fadein .18s ease}
  @keyframes fadein{from{opacity:0}to{opacity:1}}
  .modal{position:relative;width:100%;max-width:680px;background:linear-gradient(180deg,var(--panel),var(--bg2));
    border:1px solid var(--line2);border-top:3px solid var(--accent);border-radius:var(--radius);box-shadow:0 24px 70px rgba(60,45,25,.18);
    padding:26px 28px 28px;animation:slideup .22s var(--ease)}
  @keyframes slideup{from{transform:translateY(16px);opacity:.4}to{transform:translateY(0);opacity:1}}
  .modal-close{position:absolute;top:14px;right:14px;width:32px;height:32px;border-radius:8px;
    background:rgba(35,38,43,.06);border:1px solid var(--line2);color:var(--txt2);
    font-size:15px;cursor:pointer;transition:all .14s;line-height:1}
  .modal-close:hover{background:rgba(35,38,43,.1);color:var(--txt)}
  .m-tags{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px}
  .m-badge{font-size:11.5px;font-weight:700;border-radius:6px;padding:3px 10px;border:1px solid var(--line2);color:var(--txt2)}
  .m-badge.stage{color:var(--accent);border-color:var(--accent-line);background:var(--accent-soft)}
  .m-badge.lv{color:#c0623a;border-color:rgba(192,98,58,.4);background:rgba(192,98,58,.1)}
  .m-badge.imp-high{color:#d6452f;border-color:rgba(214,69,47,.4);background:rgba(214,69,47,.1)}
  .m-badge.imp-medium{color:var(--warn);border-color:rgba(224,169,58,.4);background:rgba(224,169,58,.1)}
  .m-title{font-size:21px;font-weight:800;line-height:1.42;margin-bottom:8px;padding-right:30px}
  .m-src{font-size:12.5px;color:var(--txt3);padding-bottom:14px;border-bottom:1px solid var(--line);
    display:flex;gap:14px;flex-wrap:wrap}
  .m-src b{color:var(--txt2);font-weight:600}
  .m-body{padding:16px 0;font-size:14.5px;color:var(--txt);line-height:1.85}
  .m-body p{margin-bottom:12px}
  .m-body p:last-child{margin-bottom:0}
  .m-incub{font-size:12.5px;color:var(--money);background:var(--money-bg);border:1px solid var(--money-line);
    border-radius:8px;padding:9px 13px;margin:2px 0 14px}
  .m-attrs{border-top:1px solid var(--line);padding-top:14px}
  .m-attrs-hd{font-size:11px;color:var(--txt3);letter-spacing:1px;text-transform:uppercase;margin-bottom:11px;font-family:var(--serif)}
  .m-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:11px 20px}
  .m-field .mk{font-size:11px;color:var(--txt3);margin-bottom:3px}
  .m-field .mv{font-size:13px;color:var(--txt2)}
  .m-role{display:inline-block;font-size:11.5px;padding:2px 8px;border-radius:5px;margin:3px 5px 0 0}
  .m-role.money{color:var(--money);background:var(--money-bg)}
  .m-role.power{color:var(--power);background:var(--power-bg)}
  .m-rule{display:inline-block;font-size:11.5px;color:var(--rule);background:var(--rule-bg);
    border:1px solid rgba(185,139,217,.3);border-radius:5px;padding:2px 8px;margin:3px 5px 0 0}

  /* ---------- 视图切换（列表 / 聚焦轮播）—— 放在统计栏右侧 ---------- */
  .viewbar{display:inline-flex;align-items:center;gap:10px;margin-left:auto}
  .vb-label{font-size:13px;color:var(--txt2);font-weight:600;white-space:nowrap}
  .seg{display:inline-flex;background:var(--panel);border:1px solid var(--line2);border-radius:11px;padding:3px;box-shadow:0 1px 6px rgba(60,45,25,.14)}
  .seg-btn{border:none;background:transparent;color:var(--txt2);font-size:13.5px;font-weight:600;padding:7px 19px;border-radius:8px;cursor:pointer;transition:all .18s var(--ease);font-family:var(--sans)}
  .seg-btn.active{background:var(--accent);color:#fff;box-shadow:0 2px 10px rgba(45,106,79,.30)}
  .seg-btn:hover:not(.active){color:var(--txt);background:rgba(35,38,43,.05)}
  .vb-hint{font-size:12px;color:var(--accent);margin-left:4px}

  /* 轮播 */
  .carousel{position:relative}
  .car-viewport{overflow:hidden;border-radius:var(--radius);min-height:180px}
  .car-track{display:flex;transition:transform .42s var(--ease)}
  .slide{flex:0 0 100%;max-width:100%;min-width:0;padding:4px;box-sizing:border-box}
  .car-nav{display:flex;align-items:center;justify-content:center;gap:18px;
    padding:16px 0;border-bottom:1px solid var(--line)}
  .car-btn{width:52px;height:52px;border-radius:50%;
    border:1.5px solid var(--line2);background:var(--panel);color:var(--txt);
    font-size:26px;line-height:1;cursor:pointer;transition:all .16s var(--ease);
    display:inline-flex;align-items:center;justify-content:center;
    box-shadow:0 2px 12px rgba(60,45,25,.16);flex-shrink:0}
  .car-btn:hover:not(:disabled){background:var(--accent);color:#fff;border-color:var(--accent);
    box-shadow:0 6px 18px rgba(45,106,79,.28);transform:translateY(-2px)}
  .car-btn:disabled{opacity:.24;cursor:default;transform:none}

  .idx-arrow{font-size:22px;color:var(--txt3);line-height:1;transition:transform .2s var(--ease)}
  .idx-row:hover .idx-arrow{color:var(--accent);transform:translateX(4px)}

  .idx-back:active{transform:translateX(-4px)}
  @keyframes riseIn{from{opacity:0;transform:translateY(9px)}to{opacity:1;transform:none}}

/* ================= 外链跳转：优先跳转具体新闻详情页，无则站内检索 ================= */
/*
  每条新闻可配 link 字段（真实详情页 URL）。点击时：
    ① 有 link → 直接跳转原文详情页（推荐）
    ② 无 link → 跳转到权威网站站内检索该政策标题（fallback）
  可信来源预置：新华网 / 人民网 / 中国政府网，改 NEWS_SITE 切换默认源。
*/
const NEWS_SITES = {
  xinhua:  { name:"新华网", url: q => `https://so.news.cn/#search/0/${encodeURIComponent(q)}/1/` },
  people:  { name:"人民网", url: q => `http://search.people.cn/s/?keyword=${encodeURIComponent(q)}&st=0` },
  gov:     { name:"中国政府网", url: q => `https://sousuo.www.gov.cn/sousuo/search.shtml?searchWord=${encodeURIComponent(q)}` }
};
const NEWS_SITE = "xinhua"; // 默认跳转新华网，可改为 "people" / "gov"

/* 占位/未发生的条目不提供跳转（无可检索的真实事件） */
const NO_JUMP = new Set(["a6"]);
function canJump(n){ return !NO_JUMP.has(n.id) && n.stage !== "待落地"; }

/* 从标题中提取最利于检索的关键词 */
const GENERIC_DOC = new Set(["意见","通知","办法","决定","方案","规定","条例","公告","报告","纲要"]);
function searchKeyword(n){
  const m = String(n.title).match(/《([^》]+)》/);
  let kw = m ? m[1] : String(n.title).replace(/[（(].*?[）)]/g,"").trim();
  if(kw.length < 4 || GENERIC_DOC.has(kw)) kw = `${n.story_line} ${kw}`.trim();
  return kw;
}
/* 生成该新闻的外链 URL：优先 link 字段（直接详情页），否则 fallback 站内检索 */
function newsUrl(n){
  if(n.link) return n.link;
  return NEWS_SITES[NEWS_SITE].url(searchKeyword(n));
}

/* ================= 常量与工具 ================= */
/* 固定的一级分类清单：始终全部显示（即使某类暂无新闻，也保留入口）。
   若要增删分类，改这一处即可；一条新闻可同属多个分类（topic_tags）。 */
const CATS = ["财政","健康","科技","教育","能源","汽车","环保","政务","房产"];
const TAG_LABEL = { 房产:"房产", 汽车:"汽车", 能源:"能源", 环保:"环保",
  教育:"教育", 科技:"科技", 财政:"财政", 政务:"政务", 健康:"健康" };
const STAGE_ORDER = ["内部定调","高层动员","公布执行","细则落地","待落地"];
const LEVEL_ORDER = ["中办/国办","国务院","部委/机构"];
const LEVEL_RANK  = { "中办/国办":3, "国务院":2, "部委/机构":1 };

const state = { tab:"全部", roles:new Set(), stages:new Set(), levels:new Set(), open:new Set(), view:"index", carIndex:0 };

const uniq = a => [...new Set(a)];
const byId = id => document.getElementById(id);
function esc(s){ return String(s).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function daysBetween(a,b){ return Math.round((new Date(b)-new Date(a))/86400000); }

/* 将新闻按 story_line 聚合成脉络对象 */
function buildStories(list){
  const map = new Map();
  // 归一化 story_line：弯引号↔直引号、书名号/括号、全半角空白差异，
  // 避免同一政策因引号字符不同被拆成多条脉络。
  const normSl = s =>
    (s||"").replace(/[\u201c\u201d\u201e\u201f\u2033\u2036]/g,'"')
             .replace(/[\u2018\u2019\u201a\u201b]/g,"'")
             .replace(/[《》〈〉【】\[\]]/g,'')
             .replace(/\s+/g,' ').trim();
  list.forEach(n=>{
    const key = normSl(n.story_line);
    if(!map.has(key)) map.set(key, []);
    map.get(key).push(n);
  });
  // 防御去重：同一「标题+日期」在脉络内只保留一条，
  // 防止任何残留/未来的数据重复渲染成两条（数据层已按 canon_key 兜底）。
  for(const arr of map.values()){
    const seen = new Set();
    for(let i=arr.length-1;i>=0;i--){
      const k = (arr[i].title||"") + "|" + (arr[i].date_published||arr[i].date_signed||"");
      if(seen.has(k)) arr.splice(i,1); else seen.add(k);
    }
  }
  const stories = [];
  const nd = n => n.date_published || n.date_signed || "";
  for(const [name, items] of map){
    // 脉络内新闻按时间正序（老→新），使时间线自上而下顺读；同期回退阶段序
    items.sort((x,y)=> nd(x)<nd(y)?-1 : nd(x)>nd(y)?1 : STAGE_ORDER.indexOf(x.stage)-STAGE_ORDER.indexOf(y.stage));
    const latestDate = items.map(nd).filter(Boolean).sort().slice(-1)[0] || "";
    const allActors = items.flatMap(n=>n.actors);
    const money = allActors.filter(a=>a.role==="钱袋子");
    const power = allActors.filter(a=>a.role==="权袋子");
    const dedup = arr => { const m=new Map(); arr.forEach(a=>m.set(a.name+"|"+a.action,a)); return [...m.values()]; };
    // 闭环判定：完全以实际角色数组（钱/权 actor）为准（数据层已保证 actor 与 flag 同源）。
    // 「有没有权袋子动作」与「权动了没有」来自同一数据源，绝不自相矛盾。
    const moneyMoved = money.length > 0;
    const powerMoved = power.length > 0;
    // 发文部门(牵头) + 参与部门：取自接口 puborg 结构化字段（annotate 已解析）
    const leadDept = items.map(n=>n.lead_dept).find(Boolean) || "";
    const supportDepts = uniq(items.flatMap(n=>n.support_depts||[])).filter(d=>d!==leadDept);
    const topLevel = LEVEL_ORDER.find(lv=> items.some(n=>n.issuer_level===lv)) || items[0].issuer_level;
    const latestStage = items.map(n=>n.stage).sort((a,b)=>STAGE_ORDER.indexOf(b)-STAGE_ORDER.indexOf(a))[0];
    // 脉络主分类：脉络内各条 primary_tag 的众数（多数决定）；并列时取首条的 primary_tag。
    const primaryFreq = {};
    items.forEach(n=>{ const p = n.primary_tag || (n.topic_tags&&n.topic_tags[0]) || "政务"; primaryFreq[p] = (primaryFreq[p]||0)+1; });
    let primaryTag = items[0].primary_tag || (items[0].topic_tags&&items[0].topic_tags[0]) || "政务";
    let primaryMax = -1;
    for (const k in primaryFreq){ if (primaryFreq[k] > primaryMax){ primaryMax = primaryFreq[k]; primaryTag = k; } }
    // 标签按"主分类优先"排序展示（次要标签仍保留，但仅主分类决定归属 tab）
    const tagsSorted = uniq(items.flatMap(n=>n.topic_tags)).slice().sort((a,b)=> (b===primaryTag?1:0) - (a===primaryTag?1:0));
    stories.push({
      name, items,
      tags: tagsSorted,
      primaryTag,
      levels: uniq(items.map(n=>n.issuer_level)),
      topLevel,
      crossDept: items.some(n=>n.cross_dept),
      importance: items.some(n=>n.importance==="high") ? "high" : (items.some(n=>n.importance==="medium")?"medium":"low"),
      parties: uniq(allActors.map(a=>a.name)),
      leadDept, supportDepts,
      money: dedup(money), power: dedup(power),
      rules: uniq(items.flatMap(n=>n.rules)),
      moneyMoved, powerMoved, closed: moneyMoved && powerMoved,
      latestStage, latestDate,
      upstream: uniq(items.flatMap(n=>n.upstream)),
      midstream: uniq(items.flatMap(n=>n.midstream)),
      downstream: uniq(items.flatMap(n=>n.downstream)),
      roles: uniq(allActors.map(a=>a.role))
    });
  }
  // 脉络按「最新更新时间」倒序：最近有新动静的脉络排在最前
  stories.sort((a,b)=> a.latestDate<b.latestDate?1 : a.latestDate>b.latestDate?-1 : 0);
  return stories;
}

/* 计算签发→公布时间差（取脉络内含双日期的关键新闻） */
function incubation(items){
  const c = items.find(n=>n.date_signed && n.date_published);
  if(!c) return null;
  return { signed:c.date_signed, published:c.date_published, days:daysBetween(c.date_signed,c.date_published) };
}

/* ================= 渲染 ================= */
const ALL_STORIES = buildStories(NEWS);

function renderStats(){
  byId("stats").innerHTML = `
    <div class="stat"><b>${ALL_STORIES.length}</b><span>政策脉络</span></div>
    <div class="stat"><b>${NEWS.length}</b><span>项新闻</span></div>
    <div class="stat"><b>${CATS.length}</b><span>民生板块</span></div>
    <div class="stat"><b>${ALL_STORIES.filter(s=>s.closed).length}</b><span>已闭环落地</span></div>`;
}

function renderTabs(){
  // 固定 9 大分类始终全显示（即使某类暂无新闻，计数显示 0）
  const items = ["全部", ...CATS];
  byId("tabs").innerHTML = items.map(t=>{
    const cnt = t==="全部" ? ALL_STORIES.length : ALL_STORIES.filter(s=>s.primaryTag===t).length;
    const label = t==="全部" ? "全部" : (TAG_LABEL[t]||t);
    const empty = (t!=="全部" && cnt===0) ? " empty" : "";
    return `<div class="tab ${state.tab===t?"active":""}${empty}" data-tab="${esc(t)}">${esc(label)}<span class="cnt">${cnt}</span></div>`;
  }).join("");
  byId("tabs").querySelectorAll(".tab").forEach(el=>{
    el.onclick = ()=>{ state.tab = el.dataset.tab; state.carIndex=0; state.view="index"; render(); };
  });
}

function renderFilterChips(){
  byId("stageChips").innerHTML = STAGE_ORDER.map(s=>
    `<button class="chip ${state.stages.has(s)?"on":""}" data-f="stage" data-v="${s}">${s}</button>`).join("");
  byId("levelChips").innerHTML = LEVEL_ORDER.map(l=>
    `<button class="chip ${state.levels.has(l)?"on":""}" data-f="level" data-v="${l}">${l}</button>`).join("");
  document.querySelectorAll("#filters .chip").forEach(el=>{
    const f=el.dataset.f, v=el.dataset.v;
    const set = f==="role"?state.roles : f==="stage"?state.stages : state.levels;
    el.classList.toggle("on", set.has(v));
    el.onclick = ()=>{ set.has(v)?set.delete(v):set.add(v); state.carIndex=0; render(); };
  });
}

/* 依据 tab + filters 过滤脉络 */
function filterStories(){
  return ALL_STORIES.filter(s=>{
    if(state.tab!=="全部" && s.primaryTag!==state.tab) return false;
    if(state.roles.size && ![...state.roles].every(r=>s.roles.includes(r))) return false;
    if(state.stages.size && ![...state.stages].some(st=>s.items.some(n=>n.stage===st))) return false;
    if(state.levels.size && ![...state.levels].some(lv=>s.levels.includes(lv))) return false;
    return true;
  });
}

function stepRow(no,name,bodyHtml){
  return `<div class="step"><div class="step-tag"><span class="step-no">${no}</span><span class="step-name">${name}</span></div><div class="step-body">${bodyHtml}</div></div>`;
}

    const inner = `<div class="tl-node"><span class="d"></span><span class="bar"></span></div>
        <div class="tl-body"><div class="tl-stage">${esc(n.stage)}</div>
          <div class="tl-title">${esc(n.title)}${jump?`<span class="tl-open">查看原文 ↗</span>`:''}</div>
          <div class="tl-date">${esc(dateTxt)}</div></div>`;
    return jump
      ? `<a class="${cls}" href="${esc(newsUrl(n))}" target="_blank" rel="noopener">${inner}</a>`
      : `<div class="${cls}">${inner}</div>`;
  }).join("");
  const incubHtml = incub
    ? `<div class="incub">⏳ 酝酿期 <b>${incub.days} 天</b>（${incub.signed} 内部签发 → ${incub.published} 对外公布）：反映内部定调到向社会公布的决策节奏。</div>`
    : "";
  const timeHtml = `<div class="tl">${tl}</div>${incubHtml}`;

  // ⑤ 找闭环
  const closureHtml = `<div class="closure">
      <span class="cl-item money ${s.moneyMoved?'on':''}">${s.moneyMoved?'✓':'○'} 钱动了</span>
      <span class="cl-item power ${s.powerMoved?'on':''}">${s.powerMoved?'✓':'○'} 权动了</span>
      <span class="cl-final ${s.closed?'yes':'no'}">${s.closed?'✅ 政策已闭环落地':'⏳ 尚未闭环（钱/权未同时到位）'}</span>
    </div>`;

  // ⑥ 接宏观
  const macroCell = (lb,arr)=>`<div class="macro-node"><div class="mn-lb">${lb}</div><div class="mn-v">${arr.length?arr.map(esc).join("、"):"—"}</div></div>`;
  const macroHtml = (s.upstream.length||s.midstream.length||s.downstream.length)
    ? `<div class="macro">${macroCell("上游·资源",s.upstream)}<span class="macro-arrow">→</span>${macroCell("中游·制造",s.midstream)}<span class="macro-arrow">→</span>${macroCell("下游·影响",s.downstream)}</div>`
    : `<span class="none">暂无宏观链路数据</span>`;

  // 脉络内逐条新闻明细：常驻显示（不再需要「展开明细」按钮），置于卡片顶部
  const detail = `<div class="detail"><div class="detail-inner">
      <div class="detail-hd">脉络内逐条新闻（${s.items.length}）</div>
      ${s.items.map(renderNewsDetail).join("")}
    </div></div>`;

  // 六步拆解状态摘要（折叠时显示一行）
  const stepStatus = s.closed
    ? `<span class="sd-status ok">✅ 已闭环落地</span>`
    : `<span class="sd-status pending">${s.moneyMoved?'✓':'○'}钱 ${s.powerMoved?'✓':'○'}权 · 尚未闭环</span>`;

  return `<div class="story open" data-story="${esc(s.name)}">
    <div class="story-hd">
      <div class="sh-main">
        <div class="sh-line"><span class="sh-name">${esc(s.name)}</span></div>
        <div class="sh-meta"><span>最高层级 <b>${esc(s.topLevel)}</b></span><span>最新阶段 <b>${esc(s.latestStage)}</b></span>${s.latestDate?`<span>更新 <b>${esc(s.latestDate)}</b></span>`:''}<span>共 <b>${s.items.length}</b> 条新闻</span></div>
        <div class="tags">${s.tags.map(t=>`<span class="tag ${t===s.primaryTag?'primary':''} ${t===state.tab?'hot':''}">${esc(TAG_LABEL[t]||t)}</span>`).join("")}</div>
      </div>
      <span class="closed-badge ${s.closed?'yes':'no'}">${s.closed?'已闭环落地':'跟踪中'}</span>
    </div>
    ${detail}
    <details class="steps-details">
      <summary>
        <span class="sd-title">六步法 · 政策落地拆解</span>
        ${stepStatus}
        <span class="sd-arw">▸</span>
      </summary>
      <div class="steps">
        ${stepRow("① 定性","这条有多重要",qual)}
        ${stepRow("② 看人","参与方结构",parties)}
        ${stepRow("③ 拆核心","钱袋子 vs 权袋子",coreHtml)}
        ${stepRow("③ 制度","已出台规则",rulesHtml)}
        ${stepRow("④ 排时间","过程追踪",timeHtml)}
        ${stepRow("⑤ 找闭环","钱权是否同时到位",closureHtml)}
        ${stepRow("⑥ 接宏观","上游→中游→下游",macroHtml)}
      </div>
    </details>
  </div>`;
}

function renderNewsDetail(n){
  const roles = n.actors.map(a=>`<span class="mini-role ${a.role==='钱袋子'?'money':'power'}">${esc(a.name)}·${esc(a.action)}</span>`).join("") || '<span class="none">—</span>';
  const dateTxt = [n.date_signed?`签发 ${n.date_signed}`:null, n.date_published?`公布 ${n.date_published}`:null].filter(Boolean).join(" · ") || "待发生";
  const orgTxt = [n.pub_org, n.doc_no].filter(Boolean).join(" · ");
  const jump = canJump(n);
  return `<div class="news">
    <div class="news-top"><div class="news-title">${esc(n.title)}${jump?` <a class="news-open" href="${esc(newsUrl(n))}" target="_blank" rel="noopener">查看原文 ↗</a>`:''}</div><div class="news-src">${esc(n.source)}</div></div>
    <div class="news-grid">
      <div class="nf"><div class="k">① 层级 / 重要度</div><div class="v">${esc(n.issuer_level)} · ${({high:'高',medium:'中',low:'低'})[n.importance]}${n.cross_dept?' · 跨部门':''}</div></div>
      <div class="nf"><div class="k">④ 时间</div><div class="v">${esc(dateTxt)}</div></div>
      <div class="nf"><div class="k">发文机关 / 字号</div><div class="v">${esc(orgTxt)||'—'}</div></div>
      <div class="nf"><div class="k">阶段</div><div class="v">${esc(n.stage)}</div></div>
      <div class="nf"><div class="k">⑤ 钱/权</div><div class="v">${n.money_moved?'钱✓ ':''}${n.power_moved?'权✓':''}${(!n.money_moved&&!n.power_moved)?'未动作':''}</div></div>
    </div>
    <div class="nf" style="margin-top:8px"><div class="k">③ 钱袋子/权袋子</div><div class="v">${roles}</div></div>
    ${n.rules.length?`<div class="nf" style="margin-top:6px"><div class="k">制度</div><div class="v">${n.rules.map(esc).join("、")}</div></div>`:""}
    ${n.summary?`<div class="nf news-summary" style="margin-top:6px"><div class="k">📄 政策摘要</div><div class="v">${esc(n.summary)}</div></div>`:""}
  </div>`;
}

/* 脉络目录（index 视图）：整屏列出当前板块下的全部脉络，
   点任意一条 → 下钻到聚焦轮播（carousel）并定位到该脉络。 */
function renderStoryIndexRow(s,i){
  const tab = state.tab==="全部" ? "全部板块" : state.tab;
  const tagHtml = s.tags.map(t=>`<span class="idx-tag ${t===s.primaryTag?'primary':''}">${esc(TAG_LABEL[t]||t)}</span>`).join("");
  return `<button class="idx-row" type="button" data-idx="${i}">
    <span class="idx-no">${i+1}</span>
    <span class="idx-main">
      <span class="idx-title">${esc(s.name)}</span>
      <span class="idx-meta">最高层级 ${esc(s.topLevel)} · 共 ${s.items.length} 条${s.latestDate?` · 更新 ${esc(s.latestDate)}`:''} ${tagHtml}</span>
    </span>
    <span class="idx-right">
      <span class="idx-stage">${esc(s.latestStage)}</span>
      <span class="idx-closed">${s.closed?'已闭环':'跟踪中'}</span>
    </span>
    <span class="idx-arrow">›</span>
  </button>`;
}

function renderCards(){
  let list = filterStories();
  // 每类最多 N 条脉络（政务放宽到40，其余20）：当天的脉络（latestDate===今天）全部展示；
  // 若当天+过去合计超过上限，则截到上限（当天优先全显）。「全部」板块不截断。
  if(state.tab !== "全部"){
    const d = new Date(), p = n=>String(n).padStart(2,"0");
    const todayStr = `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
    const isToday = s => s.latestDate === todayStr;
    const todayList = list.filter(isToday);
    const pastList = list.filter(s=>!isToday(s));
    const LIMIT = state.tab === "政务" ? 40 : 20;
    if(todayList.length < LIMIT){
      list = todayList.concat(pastList.slice(0, LIMIT - todayList.length));
    } // 当天 ≥ 上限条则当天全部展示，不再截断
  }
  if(!list.length){
    byId("cards").innerHTML = `<div class="empty"><div class="big">🗂</div>当前板块 / 筛选条件下暂无匹配的政策脉络<br>试试切换板块或点击"清除筛选"</div>`;
    return;
  }
  if(state.carIndex > list.length-1) state.carIndex = list.length-1;
  if(state.carIndex < 0) state.carIndex = 0;

  if(state.view === "index"){
    const tabTxt = state.tab==="全部" ? "全部板块" : state.tab;
    byId("cards").innerHTML = `
      <div class="idx-head">「${esc(tabTxt)}」下共 <b>${list.length}</b> 条政策脉络，点击任意一条进入聚焦阅读 ↓</div>
      <div class="idx-list">${list.map(renderStoryIndexRow).join("")}</div>`;
    byId("cards").querySelectorAll(".idx-row").forEach(el=>{
      el.onclick = ()=>{
        state.carIndex = parseInt(el.dataset.idx,10) || 0;
        state.view = "carousel";
        render();
      };
    });
    return;
  }

  // carousel 视图：卡片顶部提供「‹ 返回脉络目录」下钻返回入口
  const slidesHtml = list.map(s=>`<div class="slide">${renderStoryCard(s)}</div>`).join("");
  const dots = list.map((s,i)=>`<span class="car-dot ${i===state.carIndex?'active':''}" data-i="${i}"></span>`).join("");
  byId("cards").innerHTML = `
    <div class="car-back"><button class="idx-back" id="backToIndex" type="button">返回脉络目录</button></div>
    <div class="carousel">
      <div class="car-nav">
        <button class="car-btn prev" type="button" aria-label="上一条">‹</button>
        <div class="car-dots">${dots}</div>
        <button class="car-btn next" type="button" aria-label="下一条">›</button>
      </div>
      <div class="car-viewport">
        <div class="car-track">${slidesHtml}</div>
        <div class="car-progress"><b id="carPos">${state.carIndex+1}</b> / ${list.length}</div>
      </div>
    </div>`;

  const back = byId("backToIndex");
  if(back) back.onclick = ()=>{ state.view = "index"; render(); };

  byId("cards").querySelectorAll("[data-toggle]").forEach(el=>{
    el.onclick = ()=>{
      const k = el.dataset.toggle;
      state.open.has(k)?state.open.delete(k):state.open.add(k);
      render();
    };
  });
  // 新闻查证链接改用真实 <a href target=_blank>，浏览器原生跳转，
  // 不受预览沙箱/弹窗拦截影响；仅阻止冒泡以免误触发卡片展开。
  byId("cards").querySelectorAll("a.news-open, a.tl-item").forEach(el=>{
    el.addEventListener("click", e=>e.stopPropagation());
  });

  bindCarousel(list.length);
}

/* 聚焦轮播：← → 按钮 / 方向键 / 触屏滑动 / 圆点，均切换到相邻脉络卡 */
function bindCarousel(n){
  const root = byId("cards");
  const track = root.querySelector(".car-track");
  const vp = root.querySelector(".car-viewport");
  if(!track || !vp) return;

  const go = (i)=>{
    i = Math.max(0, Math.min(n-1, i));
    state.carIndex = i;
    track.style.transform = `translateX(-${i*100}%)`;
    const pos = byId("carPos"); if(pos) pos.textContent = i+1;
    root.querySelectorAll(".car-dot").forEach((d,di)=>d.classList.toggle("active", di===i));
    const prev = root.querySelector(".car-btn.prev");
    const next = root.querySelector(".car-btn.next");
    if(prev) prev.disabled = (i===0);
    if(next) next.disabled = (i===n-1);
  };

  const prev = root.querySelector(".car-btn.prev");
  const next = root.querySelector(".car-btn.next");
  if(prev) prev.onclick = ()=>go(state.carIndex-1);
  if(next) next.onclick = ()=>go(state.carIndex+1);
  root.querySelectorAll(".car-dot").forEach(d=>{
    d.onclick = ()=>go(parseInt(d.dataset.i,10));
  });

  // 键盘左右键（仅在轮播模式生效）
  const onKey = (e)=>{
    if(state.view!=="carousel") return;
    if(e.key==="ArrowLeft"){ e.preventDefault(); go(state.carIndex-1); }
    else if(e.key==="ArrowRight"){ e.preventDefault(); go(state.carIndex+1); }
  };
  document.removeEventListener("keydown", onKey);
  document.addEventListener("keydown", onKey);

  // 触屏滑动
  let sx=0, sy=0, sw=false;
  const onStart = (e)=>{ const t=e.touches?e.touches[0]:e; sx=t.clientX; sy=t.clientY; sw=true; };
  const onEnd = (e)=>{
    if(!sw) return; sw=false;
    const t=e.changedTouches?e.changedTouches[0]:e;
    const dx=t.clientX-sx, dy=t.clientY-sy;
    if(Math.abs(dx)>40 && Math.abs(dx)>Math.abs(dy)) go(state.carIndex + (dx<0?1:-1));
  };
  vp.removeEventListener("touchstart", onStart);
  vp.removeEventListener("touchend", onEnd);
  vp.addEventListener("touchstart", onStart, {passive:true});
  vp.addEventListener("touchend", onEnd, {passive:true});

  go(state.carIndex);
}

function render(){ renderTabs(); renderFilterChips(); renderViewbar(); renderCards(); }

function renderViewbar(){
  const seg = byId("seg"); if(!seg) return;
  seg.querySelectorAll(".seg-btn").forEach(b=>{
    b.classList.toggle("active", b.dataset.view===state.view);
  });
  byId("vbHint").textContent = state.view==="carousel"
    ? "聚焦阅读：左右滑（← → 按钮 / 方向键 / 触屏滑动）细读单条脉络，点「返回脉络目录」回目录"
    : "脉络目录：先纵览本板块全部脉络，点任意一条下钻进入聚焦阅读";
}

byId("reset").onclick = ()=>{ state.roles.clear(); state.stages.clear(); state.levels.clear(); state.carIndex=0; render(); };

byId("seg").querySelectorAll(".seg-btn").forEach(b=>{
  b.onclick = ()=>{ state.view = b.dataset.view; state.carIndex=0; render(); };
});

renderStats();
render();
</script>
